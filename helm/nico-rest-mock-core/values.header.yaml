# Mock host inventory under `inventory` is generated from infra-controller mockdata.
# Regenerate: go run scripts/gen-discovery/main.go

replicaCount: 1

nameOverride: ""
fullnameOverride: nico-rest-mock-core

image:
  repository: nico-core-mock
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 11079

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

logLevel: debug

extraEnv: []
extraVolumeMounts: []
extraVolumes: []

libvirt:
  enabled: false
  # libvirt URI, e.g. qemu+tcp://192.168.122.1:16509/system or qemu+ssh://root@host/system
  endpoint: ""
  storagePool: default
  # Default root volume size when the OS image does not specify capacity.
  volumeGiB: 20

# Persist VPCs, instances, and other runtime Forge state across pod restarts.
persistence:
  enabled: true
  size: 1Gi
  storageClassName: ""
  mountPath: /data
  stateFile: /data/forge-state.json
